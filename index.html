<form id="pluginForm">
    <input type="text" id="name" placeholder="Plugin Name (e.g., HealMe)" required>
    <input type="text" id="package" placeholder="Package (e.g., com.example.plugin)" required>
    <textarea id="logic" placeholder="What should the plugin do?"></textarea>
    <button type="submit">Generate .jar</button>
</form>

<script>
document.getElementById('pluginForm').onsubmit = async (e) => {
    e.preventDefault();
    const data = {
        name: document.getElementById('name').value,
        pkg: document.getElementById('package').value,
        logic: document.getElementById('logic').value
    };
    
    // Send data to backend
    const response = await fetch('/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    
    // Download the resulting file
    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${data.name}.jar`;
    a.click();
};
</script>

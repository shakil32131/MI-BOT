<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <style>
        :root {
            --bg-color: #212121;
            --sidebar-color: #171717;
            --text-color: #ececec;
            --user-msg: #303030;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        #sidebar {
            width: 260px;
            background-color: var(--sidebar-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #424242;
        }

        .new-chat {
            border: 1px solid #424242;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .new-chat:hover { background: #2f2f2f; }

        /* Main Chat Area */
        #main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 15% 100px 15%;
        }

        .message {
            margin-bottom: 25px;
            line-height: 1.6;
            max-width: 800px;
        }

        .user-msg {
            background: var(--user-msg);
            padding: 15px;
            border-radius: 15px;
            align-self: flex-end;
            margin-left: auto;
            width: fit-content;
        }

        /* Input Area */
        #input-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #user-input {
            width: 60%;
            background: #2f2f2f;
            border: 1px solid #424242;
            color: white;
            padding: 15px;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="new-chat">+ New Chat</div>
    </div>

    <div id="main">
        <div id="chat-window" id="chatWindow">
            <div class="message">Hello! I'm your AI clone. How can I help you today?</div>
        </div>

        <div id="input-container">
            <input type="text" id="user-input" placeholder="Message AI clone...">
        </div>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                // Add User Message
                const userDiv = document.createElement('div');
                userDiv.className = 'message user-msg';
                userDiv.textContent = this.value;
                chatWindow.appendChild(userDiv);

                // Simulate AI Response
                const val = this.value;
                this.value = "";
                
                setTimeout(() => {
                    const aiDiv = document.createElement('div');
                    aiDiv.className = 'message';
                    aiDiv.innerHTML = "<b>AI:</b> That's interesting! You said: " + val;
                    chatWindow.appendChild(aiDiv);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }, 600);
            }
        });
    </script>
</body>
</html>
